[env:f103-wheel-pwm]
platform = ststm32
board = bluepill_f103c8
framework = arduino
upload_protocol = stlink
monitor_speed = 115200
build_src_filter =
  +<f103_wheel_pwm.cpp>
  -<i2c_line_diagnostic.cpp>
  -<main.cpp>
  -<main.cpp.bak>
  -<ImuManager.cpp>
  -<LegKinematics.cpp>
  -<board_smoke.cpp>
  -<zero_uart_reader.cpp>
  -<yyt_can_master.cpp>
  -<yyt_can_zero.cpp>
build_flags =
  -D WHEEL_I2C_ADDR=0x12
  -D WHEEL_PWM_LIMIT=1000
  -D WHEEL_SPEED_LIMIT_MRAD_S=12000
  -D WHEEL_VEL_PID_P=0.20f
  -D WHEEL_VEL_PID_I=2.00f
  -D WHEEL_VEL_PID_D=0.00f
  -D WHEEL_VEL_LPF_TF=0.02f
lib_deps =
  askuric/Simple FOC @ ^2.3.2
