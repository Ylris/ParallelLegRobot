[env:yyt-can-zero-swapped]
; Historical test only. The custom ESP32C3 main-board schematic uses
; CAN_RX=GPIO7 and CAN_TX=GPIO6 through the TJA1050T transceiver.
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 115200
board_build.flash_mode = dio
board_build.f_flash = 40000000L
build_src_filter =
  +<yyt_can_zero.cpp>
  -<main.cpp>
  -<main.cpp.bak>
  -<board_smoke.cpp>
  -<zero_uart_reader.cpp>
  -<yyt_can_master.cpp>
  -<ImuManager.cpp>
  -<LegKinematics.cpp>
build_flags =
  -D YYT_CAN_RX_PIN=4
  -D YYT_CAN_TX_PIN=3
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1

[env:yyt-can-zero-txrx-swapped]
; Diagnostic only: tests whether the ESP32C3 logic-side CAN TX/RX were
; accidentally swapped before the TJA1050T. This does not swap CANH/CANL.
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 115200
board_build.flash_mode = dio
board_build.f_flash = 40000000L
build_src_filter =
  +<yyt_can_zero.cpp>
  -<main.cpp>
  -<main.cpp.bak>
  -<board_smoke.cpp>
  -<zero_uart_reader.cpp>
  -<yyt_can_master.cpp>
  -<ImuManager.cpp>
  -<LegKinematics.cpp>
build_flags =
  -D YYT_CAN_RX_PIN=6
  -D YYT_CAN_TX_PIN=7
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1

[env:yyt-can-zero-listen]
